# Corex Pipeline 配置文件
# 文档: https://github.com/your-org/corex/docs/pipelines.md

variables:
  base: 'D:\\Documents\\Vue3'

pipelines:
  # ── H5+ 构建流水线 ──────────────────────────────────────────────────────
  - id: build-h5
    description: H5+ 构建流水线
    schedule: '0/30 * * * * *' # 每 30 秒执行一次
    mode: sequential
    steps:
      - id: copy_cache
        module: copy
        description: 复制缓存文件
        params:
          from: '${var.base}\\component-lib\\node_modules'
          to: '${var.base}\\copies'
          empty: false
          includes: []
          excludes: ['.ts']

      - id: gen_path
        module: generate
        action: path
        description: 生成路径列表
        params:
          from: '${copy_cache.output}'
          to: '${var.base}\\path.txt'
          transform: '<include name="IDR_ITAB_{{extension}}_{{index}}" file="{{fullpath}}" type="BINDATA" />'
          index: 1
          separator: "\\"
          pad: true
          includes: []
          excludes: ['example.js', '*.git', 'node_modules']
          uppercase: ['extension']

      - id: compress_wgt
        module: compression
        description: 打包 wgt
        params:
          from: '${copy_cache.output}'
          to: '${var.base}\\H58991839.wgt'

  - id: batch-copy
    description: 批量复制流水线
    schedule: '0 0 9 * * *' # 每天 9:00 执行
    mode: sequential
    steps:
      - id: copy_modules
        module: copy
        description: 复制 node_modules
        params:
          from: '${var.base}\\component-lib\\node_modules'
          to: '${var.base}\\copies'
          includes: []
          excludes: ['.ts']

      - id: gen_path_list
        module: generate
        action: path
        description: 生成路径文件
        params:
          from: '${var.base}\\copies'
          to: '${var.base}\\path.txt'
          transform: '<include name="IDR_ITAB_{{extension}}_{{index}}" file="{{fullpath}}" type="BINDATA" />'
          index: 1
          separator: "\\"
          pad: true
          includes: []
          excludes: ['example.js', '*.git', 'node_modules']
          uppercase: ['extension']
