# Corex Pipeline v3
# version 必须为 3
# 变量：${var.*} ${env.*} ${steps.id.artifact.path}
# schedule: 可选 cron，由 `corex schedule cron` 或 `corex pipeline -p <id>` 定时触发
# watch: 可选文件监听，由 `corex watch run` 或 `corex pipeline -p <id>` debounce 后重跑整条 Pipeline
# 或直接 `corex pipeline -p <id>` 自动遵守 yaml 中的 watch / schedule 配置
#   paths: 监听路径（文件或目录，支持 ${var.*}）
#   includes / excludes: glob 白名单 / 黑名单（与 copy/generate 一致）
#   debounce_ms: 防抖毫秒，默认 300

version: 3

variables:
  base: 'D:\\Documents\\Vue3'

pipelines:
  - id: build-h5
    description: H5+ 构建流水线
    schedule: '0/30 * * * * *' # corex schedule cron 每 30 秒执行一次
    steps:
      - id: copy_cache
        module: copy
        description: 复制缓存文件
        params:
          from: '${var.base}\\component-lib\\node_modules'
          to: '${var.base}\\copies'
          empty: false
          includes: []
          excludes: ['.ts']

      - id: gen_path
        module: generate
        description: 生成路径列表
        depends_on: [copy_cache]
        params:
          Path:
            from: '${steps.copy_cache.artifact.path}'
            to: '${var.base}\\path.txt'
            transform: '<include name="IDR_ITAB_{{extension}}_{{index}}" file="{{fullpath}}" type="BINDATA" />'
            index: 1
            separator: "\\"
            pad: true
            includes: []
            excludes: ['example.js', '*.git', 'node_modules']
            uppercase: ['extension']

      - id: compress_wgt
        module: compression
        description: 打包 wgt（Zip 容器）
        depends_on: [copy_cache]
        params:
          Compress:
            scheme:
              Zip:
                from: '${steps.copy_cache.artifact.path}'
                to: '${var.base}\\H58991839.wgt'
                level: 6
                method: deflated

  - id: batch-copy
    description: 批量复制流水线
    schedule: '0 0 9 * * *' # 每天 9 点执行一次
    steps:
      - id: copy_modules
        module: copy
        description: 复制 node_modules
        params:
          from: '${var.base}\\component-lib\\node_modules'
          to: '${var.base}\\copies'
          includes: []
          excludes: ['.ts']

      - id: gen_path_list
        module: generate
        description: 生成路径文件
        depends_on: [copy_modules]
        params:
          Path:
            from: '${var.base}\\copies'
            to: '${var.base}\\path.txt'
            transform: '<include name="IDR_ITAB_{{extension}}_{{index}}" file="{{fullpath}}" type="BINDATA" />'
            index: 1
            separator: "\\"
            pad: true
            includes: []
            excludes: ['example.js', '*.git', 'node_modules']
            uppercase: ['extension']

  - id: dev-tools
    description: 新模块 smoke test（含 watch 示例，见 corex watch run -p dev-tools）
    watch:
      paths: ['${var.base}']
      includes: []
      excludes: ['**/node_modules/**', '**/.git/**']
      debounce_ms: 300
    steps:
      - id: scan_os
        module: scan
        params:
          Os: {}

      - id: hash_readme
        module: codec
        depends_on: [scan_os]
        params:
          Hash:
            scheme:
              Md5:
                file: '${var.base}\\README.md'

      - id: capture_screen
        module: screenshot
        depends_on: [hash_readme]
        params:
          Capture:
            to: '${var.base}\\screenshots'
