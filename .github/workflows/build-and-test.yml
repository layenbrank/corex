name: Build and Test

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: ""
  CARGO_INCREMENTAL: "0"

jobs:
  windows:
    name: windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Download native dependencies
        run: pwsh -File scripts/download-pdfium.ps1

      - name: Build workspace (debug)
        run: cargo build --workspace --locked --verbose

      - name: Test workspace (debug)
        run: cargo test --workspace --locked --verbose
